[main]
layer=overlay
keyboard-focus=exclusive
exit-on-keyboard-focus-loss=yes
font=MonoLisa:size=9
terminal=ghostty
show-actions=no
fields=name,generic
horizontal-pad=8
vertical-pad=4
lines=16
width=35
match-mode=fzf
icons-enabled=no
prompt=> 
password-character=*
dpi-aware=no
[colors]
background=000000f2
text=e0e0e0ff
match=ffffffff
selection=ffffff26
selection-text=ffffffff
selection-match=6a9ef5ff
border=ffffff1a

[border]
width=1
radius=8

[key-bindings]
cancel=Escape Control+c Mod1+q






